name: Grade Monitor

on:
  repository_dispatch:
    types: [run-grade-check]
  workflow_dispatch:

jobs:
  check-grades:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run grade check
        env:
          ODTU_USERNAME: ${{ secrets.ODTU_USERNAME }}
          ODTU_PASSWORD: ${{ secrets.ODTU_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODTU_BASE_URL: ${{ secrets.ODTU_BASE_URL }}
        run: |
          python3 -c "
          import os
          from grade_monitor import ODTUClassMonitor
          monitor = ODTUClassMonitor(
              username=os.environ['ODTU_USERNAME'],
              password=os.environ['ODTU_PASSWORD'],
              telegram_token=os.environ['TELEGRAM_BOT_TOKEN'],
              chat_id=os.environ['TELEGRAM_CHAT_ID'],
              grades_file_path='grades_history.json'
          )
          if monitor.login():
              monitor.check_grades()
          "

      - name: Save grades history
        run: |
          git config user.name "Grade Monitor Bot"
          git config user.email "bot@actions"
          git add -f grades_history.json
          git diff --staged --quiet || (git commit -m "chore: update grades [skip ci]" && git push)
